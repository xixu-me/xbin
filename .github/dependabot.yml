version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: daily
      time: '09:00'
      timezone: Asia/Shanghai
    commit-message:
      prefix: deps
    labels:
      - dependencies
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '09:30'
      timezone: Asia/Shanghai
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5

codecov:
  require_ci_to_pass: true
  strict_yaml_branch: main

coverage:
  precision: 2
  round: down
  range: '90...100'
  status:
    project:
      default:
        target: 95%
        threshold: 0.5%
        if_ci_failed: error
    patch:
      default:
        target: 90%
        threshold: 0%
        if_ci_failed: error

comment:
  layout: 'diff,flags'
  behavior: default
  require_changes: true
  hide_project_coverage: true

ignore:
  - 'docs/**'
  - 'migrations/**'
  - 'scripts/**'
  - 'test/**'
  - '**/*.d.ts'
  - 'worker-configuration.d.ts'
